### 웹사이트의 뼈대를 구성하는 것(HTML)
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학별 교사 간담회 내용정리</title>
  <link rel="icon" type="image/png" href="반포고 교표_투명.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">
        <img src="반포고 교표_투명.png" alt="반포고등학교 교표" class="brand-mark">
        <div>
          <div class="school-name">반포고등학교</div>
          <div class="logo">대학별 교사 간담회 내용정리</div>
        </div>
      </div>
      <div class="header-meta">BANPO HIGH SCHOOL · 2026</div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div id="schoolButtons" class="school-buttons"></div>

      <div class="control-panel">
        <div class="control-section">
          <div class="control-title">자료 검색</div>
          <div class="search-row">
            <input id="searchInput" type="text" placeholder="수능최저, 면접, 논술, 출결 등 검색">
            <button id="clearSearch">초기화</button>
          </div>
        </div>

        <div class="control-section">
          <div class="control-title">대학 비교</div>
          <div class="compare-row-ui">
            <select id="compareA"></select>
            <span class="vs">VS</span>
            <select id="compareB"></select>
            <button id="compareBtn">비교하기</button>
            <button id="closeCompareBtn">닫기</button>
          </div>
        </div>
      </div>

      <div id="compareResult"></div>
      <div id="schoolList"></div>
    </section>
  </main>

  <footer>
    2026 반포고등학교
  </footer>

  <script src="schools.js"></script>
  <script src="script.js"></script>
</body>
</html>
